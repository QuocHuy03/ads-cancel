name: Build binaries

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13      # Intel x86_64 (runs on Apple Silicon via Rosetta 2)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests

      - name: Build .app bundle
        run: |
          pyinstaller --noconfirm --windowed --name AdsCancel \
              --osx-bundle-identifier com.adscancel.app \
              ui.py

      - name: Zip the .app
        working-directory: dist
        run: zip -r AdsCancel-macos-x86_64.zip AdsCancel.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdsCancel-macos-x86_64
          path: dist/AdsCancel-macos-x86_64.zip

      - name: Attach to release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: dist/AdsCancel-macos-x86_64.zip
