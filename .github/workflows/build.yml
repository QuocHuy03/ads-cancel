name: Build binaries

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # Apple Silicon arm64 — faster queue, native on M-series
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AdsCancel-Appeal-Abuse
            dir: 1-appeal-abuse
            entry: ui.py
          - name: AdsCancel-Appeal-Payment
            dir: 2-appeal-payment
            entry: ui.py
          - name: AdsCancel-Create-MCC
            dir: 3-create-mcc
            entry: create_mcc_ui.py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests

      - name: Build .app bundle
        working-directory: ${{ matrix.dir }}
        run: |
          pyinstaller --noconfirm --windowed --name "${{ matrix.name }}" \
              --osx-bundle-identifier "com.adscancel.${{ matrix.name }}" \
              "${{ matrix.entry }}"

      - name: Zip the .app
        working-directory: ${{ matrix.dir }}/dist
        run: zip -r "${{ matrix.name }}-macos.zip" "${{ matrix.name }}.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-macos
          path: ${{ matrix.dir }}/dist/${{ matrix.name }}-macos.zip

      - name: Attach to release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: ${{ matrix.dir }}/dist/${{ matrix.name }}-macos.zip
