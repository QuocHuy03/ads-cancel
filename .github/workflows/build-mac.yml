name: Build macOS .app

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13       # Intel x86_64
            arch: x86_64
          - runner: macos-latest   # Apple Silicon arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests

      - name: Build .app bundle
        run: |
          pyinstaller --noconfirm --windowed --name AdsCancel \
              --osx-bundle-identifier com.adscancel.app \
              ui.py

      - name: Zip the .app
        working-directory: dist
        run: zip -r AdsCancel-macos-${{ matrix.arch }}.zip AdsCancel.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdsCancel-macos-${{ matrix.arch }}
          path: dist/AdsCancel-macos-${{ matrix.arch }}.zip

      - name: Attach to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AdsCancel-macos-${{ matrix.arch }}.zip
